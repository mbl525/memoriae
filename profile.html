<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>My Profile</title>
        <link href="styles.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <li><a href="index.html">home</a></li>
                    <li><a href="index.html">about</a></li>
                    <li><a href="profile.html">profile</a></li>
                    <li><a href="addConcert.html">add concert</a></li>
                </ul>
            </nav>
        </header>
        <main class="profile-page">
            <div class="diary-preview">
                <a href="journal.html">
                    <img src="assets/concert-diary.png" alt="journal">
                </a>
            </div>
            <section class="profile-content">
                <h1>my profile</h1>
                <div class="stats">
                    <h2>my stats</h2>
                    <div class="concerts-attend">
                        <h3>concerts attended</h3>
                        <p id="concert-count">loading...</p>
                    </div>
                    <div class="average-rating">
                        <h3>average rating</h3>
                        <p id="average-rating">loading...</p>
                    </div>
                </div>
                <div class="bottom-card">
                    <div class="fav-artist">
                        <h3>favourite artist</h3>
                        <p id="fav-artist-name">loading...</p>
                    </div>
                    <div class="music-player">
                        <h3>now playing...</h3>
                        <marquee id="song-title">playing 1 of 3</marquee>
                        <audio id="music-player"></audio>
                        <div class="progress">
                            <span id="current-time">0:00</span>
                            <label for="seek-slider" class="sr-only">song progress</label>
                            <input type="range" id="seek-slider" min="0" value="0">
                            <span id="total-time"></span>
                        </div>
                        <div class="music-controls">
                            <button id="prev-btn">⏮</button>
                            <button id="play-btn">▶</button>
                            <button id="next-btn">⏭</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script src ="music.js"></script>
    </body>
</html>
