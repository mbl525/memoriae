<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>My Profile</title>
        <link href="styles.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <text><b>memoriae</b></text>
                    <li><a href="index.html">home</a></li>
                    <!--want it to scroll down to about section-->
                    <li><a href="index.html">about</a></li>
                    <li><a href="profile.html">profile</a></li>
                    <li><a href="addConcert.html">add concert</a></li>
                </ul>
            </nav>
        </header>
        <main class="profile-page">
            <div class="diary-preview">
                <a href="journal.html">
                    <img src="assets/concert-diary.png" alt="journal">
                </a>
            </div>
            <section class="profile-content">
                <h1>my profile</h1>
                <div class="stats">
                    stats here
                    ill put music player + fav artist + number of concerts
                    + average star rating
                </div>
                <div class="bottom-card">
                    <div class="fav-artist"></div>
                    <div class="music-player">
                        <h3 id="song-title">playing 1 of 3</h3>
                        <audio id="music-player"></audio>
                        <div class="progress">
                            <span id="current-time">0:00</span>
                            <input type="range" id="seek-slider" min="0" value="0">
                            <span id="total-time">0:00</span>
                        </div>
                        <div class="music-controls">
                            <button id="prev-btn">⏮</button>
                            <button id="play-btn">▶</button>
                            <button id="next-btn">⏭</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script src ="music.js"></script>
    </body>
</html>
