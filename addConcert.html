<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>add your concert</title>
        <link href="styles.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <main class="form-page">
            <section class="concert-container">
                <div class="logo">
                    <a href="index.html"><b>Memoriae</b></a>
                </div>
                <h1>add concert details</h1>
                <form id="concert-form">
                    <div>
                        <label for="who">WHO?</label>
                        <input type="text" id="who" name="who">
                        <label for="when">WHEN?</label>
                        <input type="date" id="when" name="when">
                    </div>
                    <div>
                        <label for="where">LOCATION?</label>
                        <input type="text" id="where" name="where">
                        <label for="tourName">TOUR NAME?</label>
                        <input type="text" id="tourName" name="tourName">
                    </div>
                    <!-- used: https://www.w3schools.com/html/html_form_elements.asp-->

                    <div class="full-width">
                    <div>
                        <label for="rating">STAR RATING</label>
                        <select id="rating" name="rating">
                            <option value="1">★</option>
                            <option value="2">★★</option>
                            <option value="3">★★★</option>
                            <option value="4">★★★★</option>
                            <option value="5">★★★★★</option>
                        </select>
                    </div> 
                    <div>
                        <label for="notes">REVIEW - max 150 words </label>
                        <textarea id="notes" name="notes" placeholder="write about any memorable moments, notes, or other points..." rows="6" cols="60"></textarea>
                    </div>
                    <div class="polaroid">
                        <!-- allows moultiple images to be uploaded -->
                        <label for="polImg">INSERT 3 IMAGES</label>
                        <input type="file" id="polImg" name="polImg" accept="image/*" multiple>
                    </div>
                    </div>
                    <input type="submit" id="submit" value="create">
                </form>
                <div id="concerts"></div>
            </section>
        </main>
        <script src = "form.js"></script>
    </body>
</html>
